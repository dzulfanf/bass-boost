<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://bass-boost-backend.vercel.app; img-src 'self'; base-uri 'self'; frame-ancestors 'none';">
<title>Bass Boost Pro — Donate</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#03050d;color:#d0daf5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:400px}
.title{font-size:1rem;font-weight:600;color:#5a6f9a;letter-spacing:.08em;text-transform:uppercase;text-align:center;margin-bottom:32px}
.code-label{font-size:.72rem;color:#5a6f9a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.code-box{background:#0d1424;border:1px solid rgba(245,158,11,.25);border-radius:14px;padding:20px;margin-bottom:12px}
.code-value{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#f59e0b;letter-spacing:3px;text-align:center;margin-bottom:16px;min-height:1.8rem}
.code-value.loading{color:#2a3a5c;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.btn-copy{width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;color:#000;cursor:pointer;transition:filter .15s,transform .1s}
.btn-copy:hover{filter:brightness(1.08)}
.btn-copy:active{transform:scale(.98)}
.btn-copy:disabled{background:#1a2440;color:#3a4f70;cursor:not-allowed}
.btn-copy.copied{background:linear-gradient(135deg,#4ade80,#22c55e)}
.divider{border:none;border-top:1px solid #141d35;margin:24px 0}
.steps{list-style:none;counter-reset:s;margin-bottom:24px}
.steps li{counter-increment:s;font-size:.84rem;color:#5a6f9a;padding:5px 0 5px 28px;position:relative;line-height:1.5}
.steps li::before{content:counter(s);position:absolute;left:0;top:5px;width:18px;height:18px;background:#0d1424;border:1px solid #1e2d50;border-radius:50%;font-size:.65rem;font-weight:700;color:#2979ff;display:flex;align-items:center;justify-content:center}
.btn-saweria{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#0d1424;border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:13px;font-size:.9rem;font-weight:500;color:#f59e0b;cursor:pointer;text-decoration:none;transition:background .15s;margin-bottom:20px}
.btn-saweria:hover{background:#111b30}
.status{text-align:center;font-size:.82rem;color:#5a6f9a;min-height:22px;display:flex;align-items:center;justify-content:center;gap:6px}
.status.success{color:#4ade80;font-weight:600}
.spinner{width:13px;height:13px;border:2px solid #1a2440;border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.error{font-size:.78rem;color:#f87171;text-align:center;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <p class="title" id="pageTitle">Unlock Pro</p>

  <p class="code-label" id="codeLabel">Your Donation Code</p>
  <div class="code-box">
    <div class="code-value loading" id="codeValue">generating...</div>
    <button class="btn-copy" id="copyBtn" disabled>Copy Code</button>
  </div>

  <div class="error" id="errorMsg" style="display:none"></div>

  <hr class="divider">

  <ol class="steps">
    <li id="s1">Copy the code above</li>
    <li id="s2">Click "Go to Saweria" below</li>
    <li id="s3">Paste code in the donation message</li>
    <li id="s4">Donate any amount — Pro unlocks instantly</li>
  </ol>

  <a class="btn-saweria" id="saweriaBtn" href="https://saweria.co/dzulfanDev" target="_blank" rel="noopener noreferrer">
    ☕ <span id="saweriaText">Go to Saweria</span>
  </a>

  <div class="status" id="statusMsg">
    <span class="spinner"></span>
    <span id="statusText">Waiting for donation...</span>
  </div>
</div>

<script src="donate.js"></script>
</body>
</html>
